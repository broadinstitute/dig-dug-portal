version: "3"

services:
    sysbio-portal:
        build:
            context: .
            dockerfile: Dockerfile
        ports:
            - "8080:8080"
        environment:
            - PORT=8080
            - BASE_URL=/
            - BIOINDEX_HOST=https://bioindex.hugeamp.org
            - BIOINDEX_HOST_PRIVATE=https://bioindex.hugeamp.org
            - VOLCANO_DATASET_URL=https://bioindex-dev.hugeamp.org/api/raw/file/sysbio/volcano.csv.gz
            - DATASET_ASSOC_URL=https://sysbio.hugeampkpnbi.org/api/bio/query/dataset-associations
            - DEFAULT_PORTAL=
            - GA4_ID=G-D3G6XZYGBR
