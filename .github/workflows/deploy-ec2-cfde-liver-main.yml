name: Build and Deploy to EC2 (cfde-liver-main)

on:
    push:
        branches:
            - cfde-liver-main
    workflow_dispatch:

permissions:
    contents: read

concurrency:
    group: deploy-ec2-cfde-liver-main
    cancel-in-progress: true

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest
        timeout-minutes: 30

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 18

            - name: Install dependencies
              run: |
                  if [ -f package-lock.json ]; then
                    npm ci
                  else
                    npm install
                  fi

            - name: Build production assets
              env:
                  VUE_CLI_SERVICE_CONFIG_PATH: configs/vue.config.CFDELiver.js
              run: npm run deploy

            - name: Verify build output
              run: |
                  ls -la portals/CFDELiver

            - name: Deploy dist to EC2
              uses: appleboy/scp-action@v0.1.7
              with:
                  host: ${{ secrets.EC2_HOST_CFDE_LIVER }}
                  username: ${{ secrets.EC2_USER_CFDE_LIVER }}
                  key: ${{ secrets.EC2_SSH_KEY_CFDE_LIVER }}
                  port: ${{ secrets.EC2_PORT || 22 }}
                  source: portals/CFDELiver/*
                  target: ${{ secrets.EC2_TARGET_DIR_CFDE_LIVER }}
                  strip_components: 1
                  rm: true

            - name: Run post-deploy script
              uses: appleboy/ssh-action@v1.0.3
              with:
                  host: ${{ secrets.EC2_HOST_CFDE_LIVER }}
                  username: ${{ secrets.EC2_USER_CFDE_LIVER }}
                  key: ${{ secrets.EC2_SSH_KEY_CFDE_LIVER }}
                  port: ${{ secrets.EC2_PORT || 22 }}
                  script: /opt/deploy/post-deploy.sh
